<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #0c0b09; }
      .lime { fill: #d4ff3a; }
      .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
  </defs>

  <!-- Full-bleed background, no rounded corners — the OS applies its own mask shape -->
  <rect width="512" height="512" class="bg"/>

  <!-- Artwork scaled down ~78% and centered, so it survives circular/squircle cropping -->
  <g transform="translate(256,256) scale(0.78) translate(-256,-256)">
    <g stroke="#d4ff3a" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 178 198 L 178 314"/>
      <path d="M 178 256 L 256 256"/>
      <path d="M 256 256 L 334 198"/>
      <path d="M 256 256 L 334 314"/>
    </g>
    <rect x="146" y="166" width="64" height="64" rx="10" class="bg" stroke="#d4ff3a" stroke-width="6"/>
    <rect x="146" y="282" width="64" height="64" rx="10" class="bg" stroke="#d4ff3a" stroke-width="6"/>
    <rect x="224" y="224" width="64" height="64" rx="10" class="lime"/>
    <rect x="302" y="166" width="64" height="64" rx="10" class="bg" stroke="#d4ff3a" stroke-width="6"/>
    <rect x="302" y="282" width="64" height="64" rx="10" class="bg" stroke="#d4ff3a" stroke-width="6"/>
    <circle cx="256" cy="256" r="3" class="bg"/>
  </g>
</svg>
